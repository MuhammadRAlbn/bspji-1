<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reports Slider Section</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    body { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .reports-carousel {
      --report-card-width: min(82vw, 336px);
      --report-card-gap: 20px;
      clip-path: inset(-32px -120vw -32px 0);
    }
    @media (min-width: 640px) {
      .reports-carousel {
        --report-card-width: 340px;
        --report-card-gap: 28px;
      }
    }
    @media (min-width: 1024px) {
      .reports-carousel {
        --report-card-width: 330px;
        --report-card-gap: 44px;
      }
    }
  </style>
</head>
<body class="bg-white">
  <section
    x-data="reportsSlider()"
    x-init="init()"
    x-cloak
    @resize.window.debounce.150ms="measure()"
    class="relative isolate overflow-hidden bg-[#f5f8fc] py-10 sm:py-12 lg:min-h-[560px] lg:py-0"
    aria-labelledby="reports-slider-title"
  >
    <h2 id="testimonials-slider-title" class="sr-only">Testimoni Pelanggan</h2>

    <div class="mx-auto grid w-full max-w-[1920px] grid-cols-1 lg:min-h-[560px] lg:grid-cols-[49%_51%]">
      <div class="relative h-[300px] overflow-hidden sm:h-[380px] lg:h-auto">
        <img
          src="https://images.pexels.com/photos/3184339/pexels-photo-3184339.jpeg?auto=compress&cs=tinysrgb&w=1400"
          alt="Tim profesional sedang berdiskusi di kantor yang modern"
          class="h-full w-full object-cover object-center"
        />
        <div class="absolute inset-0 bg-white/5"></div>
        <div class="absolute left-1/2 top-5 z-10 flex -translate-x-1/2 items-center gap-3 sm:top-7 lg:bottom-10 lg:top-auto">
          <button
            type="button"
            @click="previous()"
            class="inline-flex h-16 w-16 items-center justify-center rounded-lg border border-[#9ba9bf] bg-white/95 text-[#7b8798] shadow-[0_8px_18px_rgba(15,23,42,0.18)] transition enabled:hover:border-[#1839a8] enabled:hover:text-[#1839a8] focus:outline-none focus:ring-2 focus:ring-[#1839a8] focus:ring-offset-2 disabled:opacity-60 sm:h-[68px] sm:w-[68px]"
            :disabled="activeIndex === 0"
            aria-label="Report sebelumnya"
          >
            <svg class="h-9 w-9" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M14.5 18L8.5 12L14.5 6" stroke="currentColor" stroke-width="2.7" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>

          <button
            type="button"
            @click="next()"
            class="inline-flex h-16 w-16 items-center justify-center rounded-lg border border-[#9ba9bf] bg-white/95 text-[#7b8798] shadow-[0_8px_18px_rgba(15,23,42,0.18)] transition enabled:hover:border-[#1839a8] enabled:hover:text-[#1839a8] focus:outline-none focus:ring-2 focus:ring-[#1839a8] focus:ring-offset-2 disabled:opacity-60 sm:h-[68px] sm:w-[68px]"
            :disabled="activeIndex === reports.length - 1"
            aria-label="Report berikutnya"
          >
            <svg class="h-9 w-9" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M9.5 6L15.5 12L9.5 18" stroke="currentColor" stroke-width="2.7" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
        </div>
      </div>

      <div class="relative flex flex-col justify-center px-5 pb-10 pt-8 sm:px-8 lg:px-0 lg:pb-0 lg:pt-0">
        <div class="pointer-events-none absolute inset-y-0 left-0 hidden w-24 bg-gradient-to-r from-[#f5f8fc]/0 to-[#f5f8fc] lg:block"></div>

        <div
          class="reports-carousel relative z-10 -mt-24 overflow-visible pl-0 pr-0 sm:-mt-28 lg:mt-0 lg:-translate-x-[19%] lg:pl-0"
          aria-live="polite"
        >
          <div
            data-report-track
            class="flex will-change-transform"
            :class="transitionEnabled ? 'transition-transform duration-700 ease-[cubic-bezier(0.22,1,0.36,1)]' : ''"
            :style="`gap: var(--report-card-gap); transform: translate3d(-${activeIndex * cardStep}px, 0, 0);`"
          >
            <template x-for="(testimonial, loopIndex) in loopedReports" :key="`${loopIndex}-${testimonial.name}`">
              <article
                data-report-card
                class="group relative flex h-[380px] shrink-0 flex-col justify-between rounded-md p-8 shadow-[0_14px_26px_rgba(15,23,42,0.18)] transition-[background-color,color,opacity,box-shadow,border-color] duration-500 sm:h-[420px] sm:p-10 lg:h-[450px] lg:p-[48px_48px] border border-transparent"
                style="width: var(--report-card-width);"
                :class="cardTone(loopIndex)"
                :aria-hidden="cardPosition(loopIndex) > 2 || cardPosition(loopIndex) < 0"
              >
                <div class="flex flex-col h-full">
                  <p
                    class="text-[14px] font-normal leading-relaxed tracking-normal sm:text-[15px] italic"
                    :class="cardPosition(loopIndex) === 0 ? 'text-white' : (cardPosition(loopIndex) === 1 ? 'text-gray-700' : 'text-[#939393]')"
                    x-text="`&ldquo;${testimonial.message}&rdquo;`"
                  ></p>

                  <div class="mt-auto flex items-center gap-5">
                    <img 
                      :src="testimonial.image" 
                      :alt="testimonial.name"
                      class="h-14 w-14 shrink-0 rounded-full object-cover border-2 shadow-sm sm:h-16 sm:w-16"
                      :class="cardPosition(loopIndex) === 0 ? 'border-white/20' : 'border-gray-100'"
                    />
                    <div class="min-w-0">
                      <h4
                        class="text-[17px] font-bold leading-tight"
                        :class="cardPosition(loopIndex) === 0 ? 'text-white' : 'text-gray-900'"
                        x-text="testimonial.name"
                      ></h4>
                      <p
                        class="text-[13px] font-medium leading-tight mt-2"
                        :class="cardPosition(loopIndex) === 0 ? 'text-white/70' : 'text-gray-500'"
                        x-text="testimonial.role"
                      ></p>
                      <p
                        class="mt-1 text-[13px] font-medium leading-tight"
                        :class="cardPosition(loopIndex) === 0 ? 'text-white/70' : 'text-gray-500'"
                        x-text="testimonial.company"
                      ></p>
                    </div>
                  </div>
                </div>
              </article>
            </template>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    function reportsSlider() {
      return {
        activeIndex: 0,
        cardStep: 0,
        transitionEnabled: true,
        isAnimating: false,
        reports: [
          {
            name: 'Andi Pratama',
            role: 'CEO',
            company: 'Tech Innovate',
            message: 'Layanan yang sangat profesional dan cepat. Kami sangat terbantu dengan solusi yang diberikan oleh tim ini dalam meningkatkan efisiensi operasional kami.',
            image: 'https://images.pexels.com/photos/2379004/pexels-photo-2379004.jpeg?auto=compress&cs=tinysrgb&w=150',
          },
          {
            name: 'Sari Wijaya',
            role: 'Marketing Director',
            company: 'Global Retail',
            message: 'Hasil yang diberikan melampaui ekspektasi kami. Strategi yang diimplementasikan sangat tepat sasaran dan berdampak signifikan pada pertumbuhan brand kami.',
            image: 'https://images.pexels.com/photos/1181686/pexels-photo-1181686.jpeg?auto=compress&cs=tinysrgb&w=150',
          },
          {
            name: 'Budi Santoso',
            role: 'Operations Manager',
            company: 'Laju Logistik',
            message: 'Transparansi dan komunikasi yang baik adalah nilai tambah utama. Kami merasa sangat aman bekerja sama dengan tim yang sangat berdedikasi ini.',
            image: 'https://images.pexels.com/photos/1222271/pexels-photo-1222271.jpeg?auto=compress&cs=tinysrgb&w=150',
          },
          {
            name: 'Diana Putri',
            role: 'Founder',
            company: 'Creative Studio',
            message: 'Kreativitas dan perhatian terhadap detail sangat luar biasa. Mereka benar-benar memahami visi kami dan mewujudkannya dengan sangat sempurna.',
            image: 'https://images.pexels.com/photos/1239291/pexels-photo-1239291.jpeg?auto=compress&cs=tinysrgb&w=150',
          },
        ],
        init() {
          this.syncActiveFlag();
          this.measure();
        },
        measure() {
          this.$nextTick(() => {
            const card = this.$root.querySelector('[data-report-card]');
            const track = this.$root.querySelector('[data-report-track]');

            if (!card || !track) return;

            const trackStyle = window.getComputedStyle(track);
            const gap = parseFloat(trackStyle.columnGap || trackStyle.gap || 0);
            this.cardStep = card.getBoundingClientRect().width + gap;
          });
        },
        get loopedReports() {
          return this.reports;
        },
        get normalizedIndex() {
          return this.activeIndex % this.reports.length;
        },
        cardPosition(loopIndex) {
          return loopIndex - this.activeIndex;
        },
        cardTone(loopIndex) {
          const position = this.cardPosition(loopIndex);

          if (position === 0) {
            return 'bg-[#1839a8] text-white opacity-100 border-transparent';
          }

          if (position === 1) {
            return 'bg-white text-black opacity-100 border-transparent';
          }

          if (position === 2) {
            return 'bg-white/65 text-[#939393] opacity-80 border-slate-200 shadow-[0_8px_18px_rgba(15,23,42,0.12)]';
          }

          return 'bg-white/0 text-[#939393] opacity-0 shadow-none pointer-events-none border-transparent';
        },
        syncActiveFlag() {
          this.reports = this.reports.map((report, index) => ({
            ...report,
            active: index === this.normalizedIndex,
          }));
        },
        next() {
          if (this.activeIndex >= this.reports.length - 1) return;

          this.transitionEnabled = true;
          this.activeIndex += 1;
          this.syncActiveFlag();
        },
        previous() {
          if (this.activeIndex <= 0) return;

          this.transitionEnabled = true;
          this.activeIndex -= 1;
          this.syncActiveFlag();
        },


      };
    }
  </script>
</body>
</html>
